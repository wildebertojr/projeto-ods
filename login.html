<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ConectaZN - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="card">
            
            <div class="painel-esquerdo">
                <div class="logo-area">
                    <img src="imagens/LOGO.png" alt="ConectaZN Logo" class="brand-logo">
                </div>
                
                <div class="conteudo-texto">
                    <h2>Bem-Vindo</h2>
                    <p>Acesse sua conta para conferir<br>as vagas na sua região.</p>
                    <button class="btn-outline">CADASTRAR</button>
                </div>
            </div>

            <div class="painel-direito">
                <h2>Acesse sua conta</h2>
                <p class="subtitulo">Informe seus dados no ConectaZN</p>

                <form action="#">
                    <div class="input-box">
                        <i class="fa-regular fa-user"></i>
                        <input type="text" placeholder="NOME" required>
                    </div>
                    
                    <div class="input-box">
                        <i class="fa-regular fa-envelope"></i>
                        <input type="email" placeholder="EMAIL" required>
                    </div>
                    
                    <div class="input-box">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" placeholder="SENHA" required>
                    </div>
                    
                    <button type="submit" class="btn-solido">ENTRAR</button>
                </form>
            </div>

        </div>
    </div>

</body>
</html>
