<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ConectaZN - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <!-- PAINEL ESQUERDO (AZUL) -->
            <div class="painel-esquerdo">
                <div class="logo-area">
                    <img src="imagens/LOGO.png" alt="ConectaZN Logo" class="brand-logo">
                </div>
                <div class="conteudo-texto">
                    <h2>Novo por aqui?</h2>
                    <p>Crie sua conta para conferir<br>as vagas na sua região.</p>
                    <!-- LINK PARA CADASTRO -->
                    <a href="criar-cadastro.html" class="btn-outline" style="text-decoration: none; text-align: center; display: inline-block;">CADASTRAR</a>
                </div>
            </div>

            <!-- PAINEL DIREITO (BRANCO) -->
            <div class="painel-direito">
                <h2>Acesse sua conta</h2>
                <p class="subtitulo">Informe seus dados no ConectaZN</p>

                <form id="form-login">
                    <div class="input-box">
                        <i class="fa-regular fa-envelope"></i>
                        <input type="email" id="auth-email" placeholder="EMAIL" required>
                    </div>
                    <div class="input-box">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="auth-senha" placeholder="SENHA" required>
                    </div>
                    <button type="submit" id="btn-auth" class="btn-solido">ENTRAR</button>
                </form>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
