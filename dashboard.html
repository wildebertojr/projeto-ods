<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>ConectaZN</title>
  <link rel="stylesheet" href="dashboard.css">

  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="layout">


  <aside class="sidebar">
    
    <div class="logo">
      <img src="imagens/LOGO.png" alt="Logo ConectaZN">
      <h2>ConectaZN</h2>
    </div>

    <ul>
      <li class="active">
        <i class="fa-solid fa-house"></i> Início
      </li>

      <li>
        <i class="fa-solid fa-briefcase"></i> Vagas
      </li>

      <li>
        <i class="fa-solid fa-user"></i> Meu Perfil
      </li>

      <li>
        <i class="fa-solid fa-clipboard"></i> Candidaturas
      </li>

      <li>
        <i class="fa-solid fa-gear"></i> Configurações
      </li>

      <!-- 🔥 AQUI É O IMPORTANTE -->
      <li class="logout" id="btn-sair">
        <i class="fa-solid fa-arrow-right-from-bracket"></i> Sair
      </li>
    </ul>

  </aside>

  
  <main class="main">

    <header class="topo">
      <h1>
        <i class="fa-solid fa-hand"></i>
        Bem-vindo
      </h1>
    </header>

    
    <section class="resumo">
      <div class="box">
        <p>Vagas</p>
        <h2>24</h2>
      </div>

      <div class="box">
        <p>Candidaturas</p>
        <h2>5</h2>
      </div>

      <div class="box">
        <p>Entrevistas</p>
        <h2>2</h2>
      </div>

      <div class="box">
        <p>Perfil</p>
        <h2>80%</h2>
      </div>
    </section>

    
    <section class="vagas">
      <h2>Vagas recentes</h2>

      <div class="vaga">
        <div>
          <h3>Auxiliar de Logística</h3>
          <p>Logis Express - Tucuruvi</p>
        </div>
        <button>Ver vaga</button>
      </div>

      <div class="vaga">
        <div>
          <h3>Atendente</h3>
          <p>Super Norte - Casa Verde</p>
        </div>
        <button>Ver vaga</button>
      </div>

    </section>

  </main>

</div>

<script src="script.js"></script>
</body>
</html>
