<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConectaZN - Criar Conta</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="card">
        <!-- PAINEL ESQUERDO (AZUL) -->
        <section class="painel-esquerdo">
            <img src="imagens/LOGO.png" alt="ConectaZN Logo" class="brand-logo">
            <div class="conteudo-texto">
                <h2>Bem-Vindo de volta</h2>
                <p>Já possui uma conta? Acesse agora mesmo.</p>
                <!-- LINK PARA VOLTAR AO LOGIN -->
                <a href="login.html" class="btn-outline" style="text-decoration: none; text-align: center; display: inline-block;">VOLTAR</a>
            </div>
        </section>

        <!-- PAINEL DIREITO (BRANCO) -->
        <section class="painel-direito">
            <h2>Crie sua conta</h2>
            <p class="subtitulo">Cadastre seus dados no ConectaZN</p>

            <form id="form-cadastro">
                <div class="input-box">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="reg-nome" placeholder="NOME COMPLETO" required>
                </div>
                <div class="input-box">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="reg-email" placeholder="EMAIL" required>
                </div>
                <div class="input-box">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="reg-senha" placeholder="SENHA" required>
                </div>
                <div class="input-box">
                    <i class="fa-solid fa-briefcase"></i>
                    <input type="text" id="reg-area" placeholder="ÁREA DE INTERESSE" required>
                </div>
                <button type="submit" class="btn-solido">CADASTRAR</button>
            </form>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
